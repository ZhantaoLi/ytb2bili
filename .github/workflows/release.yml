name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build Cross-Platform Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}"

          mkdir -p dist

          echo "Building Windows amd64..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ytb2bili-windows-amd64.exe .

          echo "Building Linux amd64..."
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ytb2bili-linux-amd64 .

          echo "Building Linux arm64..."
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ytb2bili-linux-arm64 .

          echo "Building macOS amd64..."
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ytb2bili-darwin-amd64 .

          echo "Building macOS arm64..."
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/ytb2bili-darwin-arm64 .

      - name: Create archives
        run: |
          cd dist

          # Windows - 直接打包 exe
          zip ytb2bili-windows-amd64.zip ytb2bili-windows-amd64.exe

          # Linux amd64
          mkdir -p package/ytb2bili-linux-amd64
          cp ytb2bili-linux-amd64 package/ytb2bili-linux-amd64/
          tar czf ytb2bili-linux-amd64.tar.gz -C package ytb2bili-linux-amd64

          # Linux arm64
          mkdir -p package/ytb2bili-linux-arm64
          cp ytb2bili-linux-arm64 package/ytb2bili-linux-arm64/
          tar czf ytb2bili-linux-arm64.tar.gz -C package ytb2bili-linux-arm64

          # macOS amd64
          mkdir -p package/ytb2bili-darwin-amd64
          cp ytb2bili-darwin-amd64 package/ytb2bili-darwin-amd64/
          tar czf ytb2bili-darwin-amd64.tar.gz -C package ytb2bili-darwin-amd64

          # macOS arm64
          mkdir -p package/ytb2bili-darwin-arm64
          cp ytb2bili-darwin-arm64 package/ytb2bili-darwin-arm64/
          tar czf ytb2bili-darwin-arm64.tar.gz -C package ytb2bili-darwin-arm64

          ls -lh *.zip *.tar.gz

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          cat > release-notes.md <<EOF
          ## 🚀 Release $VERSION

          ### 📦 下载

          - 🪟 Windows x64: [ytb2bili-windows-amd64.zip](https://github.com/ZhantaoLi/ytb2bili/releases/download/$VERSION/ytb2bili-windows-amd64.zip)
          - 🐧 Linux x64: [ytb2bili-linux-amd64.tar.gz](https://github.com/ZhantaoLi/ytb2bili/releases/download/$VERSION/ytb2bili-linux-amd64.tar.gz)
          - 🐧 Linux ARM64: [ytb2bili-linux-arm64.tar.gz](https://github.com/ZhantaoLi/ytb2bili/releases/download/$VERSION/ytb2bili-linux-arm64.tar.gz)
          - 🍎 macOS Intel: [ytb2bili-darwin-amd64.tar.gz](https://github.com/ZhantaoLi/ytb2bili/releases/download/$VERSION/ytb2bili-darwin-amd64.tar.gz)
          - 🍎 macOS Apple Silicon: [ytb2bili-darwin-arm64.tar.gz](https://github.com/ZhantaoLi/ytb2bili/releases/download/$VERSION/ytb2bili-darwin-arm64.tar.gz)

          ### 📝 变更说明

          - 更新 README 与 Docker 文档，修正当前运行方式和配置项
          - 默认免费流程无需付费 API，外部模型/翻译 API 均需自行配置
          - 增强发布产物，提供多平台二进制包和校验文件

          ### 🐳 Docker

          \`\`\`bash
          docker pull zhantaoli/ytb2bili:latest
          \`\`\`

          ---

          **完整文档**: [README.md](https://github.com/ZhantaoLi/ytb2bili/blob/main/README.md)
          EOF

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; updating notes and assets."
            gh release edit "$VERSION" \
              --title "Release $VERSION" \
              --notes-file release-notes.md
          else
            echo "Release $VERSION does not exist; creating it."
            gh release create "$VERSION" \
              --title "Release $VERSION" \
              --notes-file release-notes.md
          fi

          gh release upload "$VERSION" --clobber \
            dist/ytb2bili-windows-amd64.zip \
            dist/ytb2bili-linux-amd64.tar.gz \
            dist/ytb2bili-linux-arm64.tar.gz \
            dist/ytb2bili-darwin-amd64.tar.gz \
            dist/ytb2bili-darwin-arm64.tar.gz \
            dist/checksums.txt
